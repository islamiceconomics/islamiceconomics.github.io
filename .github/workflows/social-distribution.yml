name: Social Distribution

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Content source: auto, blog, or podcast'
        required: false
        default: 'auto'
      content_id:
        description: 'Optional explicit content id'
        required: false
        default: ''
      limit:
        description: 'Number of campaign packs to generate'
        required: false
        default: '1'
      publish_buffer:
        description: 'Queue X, LinkedIn, and Instagram posts to Buffer'
        required: false
        default: 'false'
      render_shorts:
        description: 'Render vertical short-video clips'
        required: false
        default: 'true'
      force:
        description: 'Ignore state and force generation'
        required: false
        default: 'false'
      recycle_after_days:
        description: 'Recycle evergreen content after N days (-1 disables)'
        required: false
        default: '45'

permissions:
  contents: write
  issues: write

jobs:
  generate-social:
    runs-on: ubuntu-latest

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: claude-sonnet-4-20250514
      AI_PROVIDER: anthropic
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5-mini
      OPENAI_REASONING_EFFORT: medium
      BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
      BUFFER_PROFILE_ID_X: ${{ secrets.BUFFER_PROFILE_ID_X }}
      BUFFER_PROFILE_ID_LINKEDIN: ${{ secrets.BUFFER_PROFILE_ID_LINKEDIN }}
      BUFFER_PROFILE_ID_INSTAGRAM: ${{ secrets.BUFFER_PROFILE_ID_INSTAGRAM }}
      BUFFER_PROFILE_ID_THREADS: ${{ secrets.BUFFER_PROFILE_ID_THREADS }}
      SOCIAL_SOURCE: ${{ github.event.inputs.source || 'podcast' }}
      SOCIAL_CONTENT_ID: ${{ github.event.inputs.content_id || '' }}
      SOCIAL_LIMIT_INPUT: ${{ github.event.inputs.limit || '' }}
      SOCIAL_PUBLISH_BUFFER: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.publish_buffer || 'false' }}
      SOCIAL_RENDER_SHORTS: ${{ github.event.inputs.render_shorts || 'true' }}
      SOCIAL_FORCE: ${{ github.event.inputs.force || 'false' }}
      SOCIAL_RECYCLE_AFTER_DAYS: ${{ github.event.inputs.recycle_after_days || '45' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Pick daily post count
        id: pick_limit
        run: |
          if [ -n "$SOCIAL_LIMIT_INPUT" ]; then
            echo "limit=$SOCIAL_LIMIT_INPUT" >> "$GITHUB_OUTPUT"
          else
            limit=$(( RANDOM % 5 + 2 ))
            echo "Today's random post count: $limit"
            echo "limit=$limit" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate social campaign packs (without Buffer)
        id: generate
        env:
          SOCIAL_LIMIT: ${{ steps.pick_limit.outputs.limit }}
        run: |
          cmd=(python scripts/generate_social_campaign.py \
            --source "$SOCIAL_SOURCE" \
            --limit "$SOCIAL_LIMIT" \
            --recycle-after-days "$SOCIAL_RECYCLE_AFTER_DAYS")

          if [ -n "$SOCIAL_CONTENT_ID" ]; then
            cmd+=(--content-id "$SOCIAL_CONTENT_ID")
          fi

          if [ "$SOCIAL_FORCE" = "true" ]; then
            cmd+=(--force)
          fi

          "${cmd[@]}"

      - name: Commit quote cards and state (pre-Buffer)
        id: commit_cards
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "Social Distribution Bot"
          git config user.email "bot@islamiceconomics.local"
          mkdir -p Website/social/cards
          cp -f social/cards/*.png Website/social/cards/ 2>/dev/null || true
          git add -f social/cards/ social/state/ social/campaigns/
          git add -f Website/social/cards/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no_card_changes=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add quote cards and campaigns - $(date -u +'%Y-%m-%d')"
            git push
            echo "no_card_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for GitHub Pages deployment
        if: steps.commit_cards.outputs.no_card_changes != 'true' && env.SOCIAL_PUBLISH_BUFFER == 'true'
        run: |
          echo "Waiting 60s for GitHub Pages to deploy quote cards..."
          sleep 60

      - name: Publish to Buffer
        id: buffer_publish
        if: steps.generate.outcome == 'success' && env.SOCIAL_PUBLISH_BUFFER == 'true'
        run: |
          python - <<'PY'
          import json, os, sys
          from pathlib import Path

          sys.path.insert(0, "scripts")
          from generate_social_campaign import queue_to_buffer, load_state, save_state

          campaigns_dir = Path("social/campaigns")
          today = __import__("datetime").datetime.now(__import__("datetime").timezone.utc).strftime("%Y-%m-%d")
          campaign_files = sorted(campaigns_dir.glob(f"{today}*.json"))

          if not campaign_files:
              print("No campaign files found for today.")
              sys.exit(0)

          any_failed = False
          for cf in campaign_files:
              campaign = json.loads(cf.read_text())
              # Skip campaigns already published or without card URLs
              if campaign.get("buffer") and any(
                  r.get("status") == "queued" for r in campaign["buffer"].values()
              ):
                  print(f"Skipping (already published): {cf.name}")
                  continue
              if not campaign.get("instagram_card_url"):
                  print(f"Skipping (no card URL): {cf.name}")
                  continue
              print(f"Publishing: {cf.name}")
              result = queue_to_buffer(campaign)
              campaign["buffer"] = result
              cf.write_text(json.dumps(campaign, indent=2, ensure_ascii=False))
              print(json.dumps(result, indent=2))
              if any(r.get("status") == "error" for r in result.values()):
                  any_failed = True

          if any_failed:
              sys.exit(1)
          PY

      - name: Show latest campaign buffer result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          campaigns = sorted(Path("social/campaigns").glob("*.json"), key=lambda path: path.stat().st_mtime)
          if not campaigns:
              print("No campaign JSON files found.")
              raise SystemExit(0)

          latest = campaigns[-1]
          payload = json.loads(latest.read_text(encoding="utf-8"))
          print(f"Latest campaign file: {latest}")
          print(json.dumps(payload.get("buffer", {}), indent=2))
          PY

      - name: Upload social campaign artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-campaigns
          path: |
            social/campaigns
            social/state
            social/cards
          if-no-files-found: warn

      - name: Render short-video clips
        id: render
        if: steps.generate.outcome == 'success' && env.SOCIAL_RENDER_SHORTS == 'true'
        continue-on-error: true
        env:
          SOCIAL_LIMIT: ${{ steps.pick_limit.outputs.limit }}
        run: |
          cmd=(python scripts/render_social_clips.py \
            --limit "$SOCIAL_LIMIT")

          if [ -n "$SOCIAL_CONTENT_ID" ]; then
            cmd+=(--source-content-id "$SOCIAL_CONTENT_ID")
          fi

          if [ "$SOCIAL_FORCE" = "true" ]; then
            cmd+=(--force)
          fi

          "${cmd[@]}"

      - name: Upload rendered short-video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: social-short-videos
          path: social/shorts/rendered
          if-no-files-found: warn

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push remaining changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Social Distribution Bot"
          git config user.email "bot@islamiceconomics.local"
          git add social/README.md social/state social/campaigns social/cards social/shorts/.gitignore social/shorts/.gitkeep social/shorts/rendered/.gitkeep
          git add Website/social/cards/ 2>/dev/null || true
          git commit -m "Social campaign update - $(date -u +'%Y-%m-%d')"
          git push

      - name: Create issue on failure
        if: steps.generate.outcome == 'failure' || steps.render.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Social Distribution Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `The social distribution workflow failed on ${new Date().toISOString().split('T')[0]}.\n\nCheck the run logs here: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            })
